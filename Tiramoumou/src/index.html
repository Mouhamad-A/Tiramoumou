<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
</head>

<body>
    <header>
        <nav class="flex justify-center p-4">
            <img class="w-40 h-auto md:w-60 h-auto rounded-3xl shadow-xl/30" src="./assets/img/Logo.png" alt="Logo">
        </nav>

        <div class="flex items-center w-full my-5">
            <div class="flex-1 h-px bg-gradient-to-r from-transparent to-[#b8966a]"></div>
            <div class="flex items-center gap-2.5 px-4 text-[#d4b483]">
                <span class="text-xs">✦</span>
                <span class="text-xs">✦</span>
                <span class="text-base">✦</span>
                <span class="text-xs">✦</span>
                <span class="text-xs">✦</span>
            </div>
            <div class="flex-1 h-px bg-gradient-to-l from-transparent to-[#b8966a]"></div>
        </div>

        <h1 class="text-center font-['Italia'] text-4xl font-medium">La vérité c'est trop bon Tiramoumou</h1>
        <p class="text-center font-['Playfair'] text-gray-400 text-15 my-3.5">Fait maison · Artisanal · Lyon</p>
        <div class="flex items-center w-full my-5">
            <div class="flex-1 h-px bg-gradient-to-r from-transparent to-[#b8966a]"></div>
            <div class="flex items-center gap-2.5 px-4 text-[#d4b483]">
                <span class="text-xs">✦</span>
                <span class="text-xs">✦</span>
                <span class="text-base">✦</span>
                <span class="text-xs">✦</span>
                <span class="text-xs">✦</span>
            </div>
            <div class="flex-1 h-px bg-gradient-to-l from-transparent to-[#b8966a]"></div>
        </div>
        <h1 class="font-serif text-3xl font-light text-espresso italic text-center mb-15 mt-15">Nos Produits :</h1>

    </header>

    <main class=" flex justify-center">
        <div class="grid grid-cols-1 md:grid-cols-2 md:gap-35 gap-10 mb-10 ">
            <div
                class="w-80 h-105 bg-orange-100 rounded-xl border border-black transition duration-300 hover:-translate-y-2">
                <!-- Conteneur image -->
                <div class="relative group">

                    <!-- Image principale -->
                    <img class="w-full h-72 object-cover rounded-xl" src="./assets/img/Framboise.png" alt="">

                    <!-- Image hover -->
                    <img class="absolute inset-0 w-full h-72 object-cover rounded-xl opacity-0 group-hover:opacity-100 transition duration-300"
                        src="./assets/img/Ingredient_F.png" alt="">

                </div>
                <h2 class="text-xl font-extralight text-center mt-3.5">Tiramisu Framboise/coco </h2>
                <p class="text-2xl font-semibold text-center text-red-400">2 €</p>
                <div class="flex justify-center">
                    <button
                        class="p-1 px-10.5 bg-amber-700 text-white border-1 text-center border-amber-900 rounded-xl mt-3.5 hover:bg-amber-500">Réserver</button>
                </div>
            </div>
            <div
                class="w-80 h-105 bg-orange-100 rounded-xl border border-black transition duration-300 hover:-translate-y-2">
                <div class="relative group">

                    <!-- Image principale -->
                    <img class="w-full h-72 object-cover rounded-xl" src="./assets/img/Brownie.png" alt="">

                    <!-- Image hover -->
                    <img class="absolute inset-0 w-full h-72 object-cover rounded-xl opacity-0 group-hover:opacity-100 transition duration-300"
                        src="./assets/img/Ingredient_B.png" alt="">

                </div>
                <h2 class="text-xl font-extralight text-center mt-3.5">Tiramisu Brownie/Biscuit beurre</h2>
                <p class="text-2xl font-semibold text-center text-red-400">2 €</p>
                <div class="flex justify-center">
                    <button
                        class="p-1 px-10.5 bg-amber-700 text-white border-1 text-center border-amber-900 rounded-xl hover:bg-amber-500 mt-3.5">Réserver</button>
                </div>
            </div>


        </div>
    </main>

</body>

</html>
